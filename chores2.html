<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Street Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=Satisfy&display=swap');
        
        :root {
            --disney-blue: #0066cc;
            --disney-gold: #ffcc00;
            --disney-navy: #002244;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background: #f8fafc; 
            color: #1a202c; 
        }

        .disney-gradient { 
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%); 
        }

        .magic-gold { 
            background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%); 
        }

        .castle-font {
            font-family: 'Satisfy', cursive;
        }

        .card-glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(0, 102, 204, 0.1); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .loading-spinner { 
            border: 4px solid rgba(0, 102, 204, 0.1); 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border-left-color: var(--disney-blue); 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sparkle {
            animation: sparkle-anim 2s infinite;
        }

        @keyframes sparkle-anim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .bonus-badge {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Splash Screen -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center space-y-6">
        <div class="relative">
            <i class="fas fa-fort-awesome text-6xl text-blue-600 sparkle"></i>
        </div>
        <div class="text-center">
            <h2 class="castle-font text-3xl text-blue-800">Main Street</h2>
            <p class="text-xs uppercase tracking-widest text-gray-400 font-bold">Opening the Gates...</p>
        </div>
        <div class="loading-spinner"></div>
        <button id="retryBtn" onclick="location.reload()" class="hidden px-8 py-3 disney-gradient text-white rounded-full font-bold shadow-xl">Retry Entrance</button>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen pb-20 hidden relative bg-slate-50 shadow-2xl overflow-hidden">
        
        <!-- Disney Header -->
        <header class="relative p-6 bg-white border-b border-blue-50 sticky top-0 z-10">
            <div class="flex justify-between items-start">
                <div id="userHeader">
                    <h1 class="castle-font text-3xl text-blue-700" id="welcomeText">Welcome Home</h1>
                    <p class="text-[10px] uppercase tracking-tighter text-blue-400 font-extrabold" id="userRoleDisplay">Park Guest</p>
                </div>
                <div class="flex gap-1">
                    <button onclick="refreshData()" class="text-blue-300 hover:text-blue-600 p-2 transition-all"><i class="fas fa-redo-alt text-sm"></i></button>
                    <button onclick="logout()" class="text-gray-300 hover:text-red-500 p-2 transition-all"><i class="fas fa-power-off text-sm"></i></button>
                </div>
            </div>

            <!-- Magic Stats -->
            <div id="statsBar" class="mt-4 flex gap-2 hidden">
                <div class="magic-gold flex-1 p-3 rounded-2xl text-blue-900 shadow-sm flex items-center justify-between overflow-hidden relative">
                    <i class="fas fa-wand-magic-sparkles absolute -right-2 -bottom-2 opacity-10 text-4xl"></i>
                    <div>
                        <p class="text-[9px] uppercase font-black opacity-60">Magic Points</p>
                        <p class="text-xl font-black" id="statGold">0</p>
                    </div>
                    <i class="fas fa-certificate text-xl opacity-40"></i>
                </div>
                <div class="bg-blue-50 flex-1 p-3 rounded-2xl text-blue-700 border border-blue-100 flex items-center justify-between">
                    <div>
                        <p class="text-[9px] uppercase font-black text-blue-300">Daily Streak</p>
                        <p class="text-xl font-black flex items-center gap-1">
                            <span id="statStreak">0</span>
                            <i class="fas fa-star text-yellow-400 text-xs sparkle"></i>
                        </p>
                    </div>
                    <i class="fas fa-calendar-star text-xl opacity-20"></i>
                </div>
            </div>
        </header>

        <main class="p-6">
            <!-- Park Entrance / Login -->
            <section id="loginView" class="space-y-8 py-4">
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-blue-50 mb-4 border-4 border-white shadow-inner">
                        <i class="fas fa-ticket-alt text-4xl text-blue-500 -rotate-12"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800">Who is visiting today?</h2>
                    <p class="text-sm text-slate-400 mt-1">Select your pass to enter the park</p>
                </div>
                <div id="userList" class="grid grid-cols-1 gap-4"></div>
            </section>

            <!-- Kids Area (Park Attractions) -->
            <section id="kidDashboard" class="hidden space-y-8">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 flex items-center gap-2">
                            <i class="fas fa-map-marked-alt text-blue-600"></i> My FastPass Tasks
                        </h3>
                    </div>
                    <div id="assignedQuests" class="space-y-3"></div>
                </div>

                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-4 flex items-center gap-2">
                        <i class="fas fa-globe-americas text-blue-600"></i> Open Adventures
                    </h3>
                    <div id="openBounties" class="space-y-3"></div>
                </div>

                <div id="completedSection" class="pt-6 border-t border-slate-200">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-300 mb-4 flex items-center gap-2">
                        <i class="fas fa-camera-retro"></i> Memories from Today
                    </h3>
                    <div id="completedToday" class="space-y-3 opacity-60"></div>
                </div>
            </section>

            <!-- Parents Area (Cast Member Hub) -->
            <section id="parentDashboard" class="hidden space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-black text-blue-900">Cast Member Review</h3>
                    <span id="pendingCount" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">0 Waiting</span>
                </div>
                <div id="approvalQueue" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 disney-gradient text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-500 opacity-0 translate-y-10 z-50 pointer-events-none text-sm font-bold border-2 border-white/20"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzrtt-QKb11mK6HWj4-vkdUHOh1RHhLl-eDoHGZeCNtxN1EZ5xl8cwlulEAIFRh3plA-g/exec';
        let appData = null;
        let currentUser = null;

        window.onload = async () => {
            const success = await refreshData();
            if (success) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                const savedUser = localStorage.getItem('choreHero');
                if (savedUser) {
                    try {
                        const parsed = JSON.parse(savedUser);
                        selectUser(parsed.Name);
                    } catch(e) {
                        renderUserSelection();
                    }
                } else {
                    renderUserSelection();
                }
            } else {
                const overlayText = document.getElementById('loadingOverlay').querySelector('p');
                overlayText.innerHTML = `<span class="text-red-500 font-bold italic">COMMUNICATION BREAKDOWN<br><small class="text-gray-400">The Magic is temporarily offline.</small></span>`;
                document.getElementById('retryBtn').classList.remove('hidden');
                document.querySelector('.loading-spinner').classList.add('hidden');
            }
        };

        async function refreshData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response not ok');
                appData = await response.json();
                if (currentUser) {
                    const updatedUser = appData.users.find(u => u.Name === currentUser.Name);
                    if (updatedUser) {
                        currentUser = updatedUser;
                        updateProfileUI();
                        currentUser.Role === 'Parent' ? renderApprovalQueue() : renderChoreBoard();
                    }
                }
                return true;
            } catch (e) {
                console.error("Refresh Error:", e);
                return false;
            }
        }

        function renderUserSelection() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            if (!appData || !appData.users) return;
            appData.users.forEach(user => {
                if (!user.Name) return;
                const btn = document.createElement('button');
                btn.className = "card-glass p-5 rounded-3xl flex items-center gap-4 hover:scale-[1.02] active:scale-[0.98] transition-all text-left shadow-sm border-2 border-transparent hover:border-blue-400 group";
                btn.innerHTML = `
                    <div class="w-14 h-14 rounded-2xl disney-gradient flex items-center justify-center text-white text-2xl shadow-lg group-hover:rotate-6 transition-transform">
                        <i class="fas ${user.Role === 'Parent' ? 'fa-user-tie' : 'fa-smile'}"></i>
                    </div>
                    <div>
                        <p class="font-black text-xl text-slate-800">${user.Name}</p>
                        <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">${user.Role === 'Parent' ? 'Cast Member' : 'Park Guest'}</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-200 group-hover:text-blue-400 transition-colors"></i>`;
                btn.onclick = () => selectUser(user.Name);
                list.appendChild(btn);
            });
        }

        function selectUser(userName) {
            currentUser = appData.users.find(u => u.Name === userName);
            if (!currentUser) { renderUserSelection(); return; }
            localStorage.setItem('choreHero', JSON.stringify(currentUser));
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('welcomeText').innerText = `Welcome, ${currentUser.Name}!`;
            document.getElementById('userRoleDisplay').innerText = currentUser.Role === 'Parent' ? 'Main Street Cast Member' : 'Magic Kingdom Guest';
            
            if (currentUser.Role === 'Parent') {
                document.getElementById('statsBar').classList.add('hidden');
                document.getElementById('parentDashboard').classList.remove('hidden');
                document.getElementById('kidDashboard').classList.add('hidden');
                renderApprovalQueue();
            } else {
                document.getElementById('statsBar').classList.remove('hidden');
                document.getElementById('kidDashboard').classList.remove('hidden');
                document.getElementById('parentDashboard').classList.add('hidden');
                updateProfileUI();
                renderChoreBoard();
            }
        }

        function updateProfileUI() {
            document.getElementById('statGold').innerText = currentUser['Total Points'] || 0;
            document.getElementById('statStreak').innerText = currentUser['Current Streak'] || 0;
        }

        function findKey(obj, possibleKeys) {
            if (!obj) return null;
            const actualKeys = Object.keys(obj);
            for (let pk of possibleKeys) {
                const found = actualKeys.find(ak => ak.toLowerCase().replace(/[^a-z]/g, '') === pk.toLowerCase().replace(/[^a-z]/g, ''));
                if (found) return found;
            }
            return null;
        }

        function isToday(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            const d = new Date(dateStr);
            return d.getDate() === today.getDate() &&
                   d.getMonth() === today.getMonth() &&
                   d.getFullYear() === today.getFullYear();
        }

        function isThisWeek(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now.getTime() - d.getTime();
            return diff < (7 * 24 * 60 * 60 * 1000);
        }

        function renderChoreBoard() {
            const qDiv = document.getElementById('assignedQuests');
            const bDiv = document.getElementById('openBounties');
            const cDiv = document.getElementById('completedToday');
            qDiv.innerHTML = ''; bDiv.innerHTML = ''; cDiv.innerHTML = '';
            
            if (!appData || !appData.chores) return;

            const choreKeys = {
                name: findKey(appData.chores[0], ['Task/Room', 'TaskRoom', 'Task', 'Name']),
                assigned: findKey(appData.chores[0], ['Assigned To', 'AssignedTo', 'Assigned']),
                points: findKey(appData.chores[0], ['Base Points', 'BasePoints', 'Points']),
                freq: findKey(appData.chores[0], ['Frequency', 'Freq', 'Reset'])
            };

            const taskLog = appData.taskLog || [];
            
            appData.chores.forEach(chore => {
                const name = chore[choreKeys.name];
                const basePoints = parseInt(chore[choreKeys.points] || 0);
                const assigned = String(chore[choreKeys.assigned] || '').toLowerCase().trim();
                const freq = String(chore[choreKeys.freq] || 'Daily').toLowerCase().trim();
                const userNameLower = String(currentUser.Name).toLowerCase().trim();
                
                if (!name) return;

                const logEntries = taskLog.filter(l => String(l['Task Name'] || '').toLowerCase() === name.toLowerCase());
                const todaysEntry = logEntries.find(l => isToday(l.Timestamp));
                const lastApprovedEntry = logEntries.filter(l => l.Status === 'Approved').sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp))[0];
                
                const status = todaysEntry ? todaysEntry.Status : null;

                const isAssignedToMe = (assigned === userNameLower);
                const isOpenBounty = (assigned === 'open');

                if (isAssignedToMe) {
                    if (status && status !== 'Denied') {
                        cDiv.appendChild(createChoreCard(name, basePoints, 'border-slate-200', status));
                    } else {
                        qDiv.appendChild(createChoreCard(name, basePoints, 'border-blue-500', null));
                    }
                } 
                else if (isOpenBounty) {
                    let isAvailable = true;
                    if (freq === 'weekly' && lastApprovedEntry && isThisWeek(lastApprovedEntry.Timestamp)) {
                        isAvailable = false;
                    } else if (todaysEntry && (todaysEntry.Status === 'Pending' || todaysEntry.Status === 'Approved')) {
                        isAvailable = false;
                    }

                    if (isAvailable) {
                        bDiv.appendChild(createChoreCard(name, basePoints, 'border-amber-400', null));
                    } else if (todaysEntry) {
                        cDiv.appendChild(createChoreCard(name, basePoints, 'border-slate-200', todaysEntry.Status));
                    }
                }
            });

            if (qDiv.innerHTML === '') qDiv.innerHTML = '<p class="text-slate-400 text-xs italic text-center py-4 bg-white rounded-2xl border border-dashed border-slate-200">No scheduled FastPass tasks.</p>';
            if (bDiv.innerHTML === '') bDiv.innerHTML = '<p class="text-slate-400 text-xs italic text-center py-4 bg-white rounded-2xl border border-dashed border-slate-200">The park map is clear!</p>';
            if (cDiv.innerHTML === '') document.getElementById('completedSection').classList.add('hidden');
            else document.getElementById('completedSection').classList.remove('hidden');
        }

        function createChoreCard(name, basePoints, borderColor, status) {
            const card = document.createElement('div');
            card.className = `card-glass p-5 rounded-2xl flex justify-between items-center shadow-sm border-l-8 ${borderColor} relative overflow-hidden`;
            
            // Streak Bonus Logic: 2 bonus points per streak day
            const streakCount = parseInt(currentUser['Current Streak'] || 0);
            const streakBonus = streakCount * 2; 
            const totalPoints = basePoints + streakBonus;

            let actionHtml = '';
            if (!status) {
                actionHtml = `<button onclick="submitChore('${name.replace(/'/g, "\\'")}', ${totalPoints})" 
                    class="disney-gradient text-white px-5 py-2 rounded-xl text-[10px] font-black shadow-lg hover:brightness-110 active:scale-95 transition-all">
                    COMPLETE
                </button>`;
            } else {
                const colorClass = status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700';
                actionHtml = `<span class="${colorClass} px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider border border-current opacity-80">${status}</span>`;
            }

            // Visual feedback for the bonus
            const bonusUi = (streakBonus > 0 && !status) ? 
                `<span class="text-[8px] bg-green-100 text-green-600 px-1.5 py-0.5 rounded ml-2 font-black bonus-badge flex items-center gap-1">
                    <i class="fas fa-fire-alt"></i> +${streakBonus} Streak Bonus
                </span>` : '';

            card.innerHTML = `
                <div class="z-10">
                    <h4 class="font-black text-slate-800 text-lg leading-tight mb-1">${name}</h4>
                    <div class="flex items-center">
                        <span class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-black uppercase tracking-tighter">${basePoints} Base</span>
                        ${bonusUi}
                    </div>
                </div>
                <div class="z-10">
                    ${actionHtml}
                </div>`;
            return card;
        }

        async function submitChore(name, totalPoints) {
            showToast(`Saving memory... ✨`);
            try {
                // Submit totalPoints (Base + Bonus) so it is logged correctly in the sheet
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        action: "submitChore", 
                        worker: currentUser.Name, 
                        choreName: name, 
                        points: totalPoints 
                    })
                });
                showToast("Adventure logged!");
                setTimeout(refreshData, 1500);
            } catch (e) { 
                showToast("Park signal lost!"); 
            }
        }

        function renderApprovalQueue() {
            const queue = document.getElementById('approvalQueue');
            queue.innerHTML = '';
            if (!appData || !appData.taskLog) return;
            const pending = appData.taskLog.filter(t => String(t.Status || '').trim().toLowerCase() === 'pending');
            document.getElementById('pendingCount').innerText = `${pending.length} Waiting`;
            
            if (pending.length === 0) {
                queue.innerHTML = `
                    <div class="text-center py-12 px-6">
                        <i class="fas fa-magic text-4xl text-slate-100 mb-4"></i>
                        <p class="text-slate-400 text-sm font-medium">All guests are happy!<br>No reviews needed right now.</p>
                    </div>`;
                return;
            }

            pending.forEach(task => {
                const wKey = findKey(task, ['Worker Name', 'WorkerName', 'Worker']);
                const nKey = findKey(task, ['Task Name', 'TaskName', 'Task']);
                const pKey = findKey(task, ['Points Potential', 'PointsPotential', 'Points']);
                
                const workerName = task[wKey];
                const taskName = task[nKey];
                const pointsToAward = task[pKey] || 0;

                const card = document.createElement('div');
                card.className = "card-glass p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 space-y-4";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">${workerName}</p>
                            <h4 class="font-black text-lg text-slate-800">${taskName}</h4>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-xl text-amber-500">${pointsToAward}</p>
                            <p class="text-[8px] font-bold text-slate-300 uppercase tracking-tighter">Points</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveJob('${workerName.replace(/'/g, "\\'")}', '${taskName.replace(/'/g, "\\'")}', ${pointsToAward}, true)" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all">Grant Points</button>
                        <button onclick="approveJob('${workerName.replace(/'/g, "\\'")}', '${taskName.replace(/'/g, "\\'")}', ${pointsToAward}, false)" class="px-6 bg-white border border-slate-200 text-slate-400 py-3 rounded-xl font-black text-[10px] uppercase active:scale-95 transition-all">Deny</button>
                    </div>`;
                queue.appendChild(card);
            });
        }

        async function approveJob(worker, task, points, approved) {
            showToast("Processing...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        action: "approveChore", 
                        worker: worker, 
                        choreName: task, 
                        points: points, 
                        approved: approved, 
                        approverName: currentUser.Name 
                    })
                });
                showToast(approved ? "Points granted! ✨" : "Review finished.");
                setTimeout(refreshData, 1500);
            } catch (e) { 
                showToast("Connection failed."); 
            }
        }

        function logout() { 
            localStorage.removeItem('choreHero'); 
            location.reload(); 
        }

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; 
            t.classList.remove('opacity-0', 'translate-y-10'); 
            setTimeout(() => { t.classList.add('opacity-0', 'translate-y-10'); }, 3000); 
        }
    </script>
</body>
</html>
