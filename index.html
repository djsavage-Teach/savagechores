<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Street Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=Satisfy&display=swap');
        
        :root {
            --theme-primary: #0066cc;
            --theme-secondary: #004499;
            --theme-accent: #ffcc00;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background: #0f172a; 
            color: #1a202c; 
            margin: 0;
            padding: 0;
        }

        /* Global Background Constant */
        .app-bg {
            background-image: url('https://thumbs.dreamstime.com/b/stunning-cosmic-images-371141643.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Splash Screen - More visible background */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        
        #loadingOverlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3); /* Slight tint for text readability */
            z-index: -1;
        }

        /* Main App Container */
        #app {
            position: relative;
            min-height: 100vh;
        }

        /* Minimalist Glass Filter Overlay for Main App */
        #app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px) saturate(140%);
            z-index: 0;
        }

        /* Ensure content sits above glass filter */
        #app > * {
            position: relative;
            z-index: 1;
        }

        .disney-gradient { 
            background: linear-gradient(135deg, var(--theme-primary) 0%, var(--theme-secondary) 100%); 
        }

        .magic-gold { 
            background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%); 
        }

        .castle-font {
            font-family: 'Satisfy', cursive;
        }

        .card-glass { 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(4px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .fit-avatar {
            object-fit: contain !important;
            padding: 8px;
            background: rgba(255, 255, 255, 0.8);
        }

        .loading-spinner { 
            border: 4px solid rgba(255, 255, 255, 0.2); 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border-left-color: white; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sparkle {
            animation: sparkle-anim 2s infinite;
        }

        @keyframes sparkle-anim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .bonus-badge {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .profile-pic {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        header {
            background: rgba(255, 255, 255, 0.35) !important;
            backdrop-filter: blur(12px);
        }

        .hidden-fade {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body class="app-bg">

    <!-- Splash Screen -->
    <div id="loadingOverlay">
        <div class="space-y-6 flex flex-col items-center">
            <div class="relative">
                <i class="fas fa-fort-awesome text-7xl text-white sparkle"></i>
            </div>
            <div class="px-6">
                <h2 class="castle-font text-4xl text-white drop-shadow-xl">Welcome to the Disney Chores Game</h2>
                <p id="loadingMsg" class="text-xs uppercase tracking-widest text-white/70 font-bold mt-4">Opening the Gates...</p>
            </div>
            <div class="loading-spinner"></div>
            <button id="retryBtn" onclick="location.reload()" class="hidden px-8 py-3 bg-white text-blue-900 rounded-full font-bold shadow-xl mt-4">Retry Entrance</button>
        </div>
    </div>

    <!-- Main App Content -->
    <div id="app" class="max-w-md mx-auto hidden shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <header id="appHeader" class="relative p-6 border-b border-blue-50 sticky top-0 z-10 transition-colors duration-500">
            <div class="flex justify-between items-start">
                <div id="userHeader" class="flex items-center gap-3">
                    <img id="currentProfileImg" src="" class="hidden profile-pic" alt="Profile">
                    <div>
                        <h1 class="castle-font text-3xl text-blue-700" id="welcomeText">Welcome Home</h1>
                        <p class="text-[10px] uppercase tracking-tighter text-blue-400 font-extrabold" id="userRoleDisplay">Park Guest</p>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button onclick="refreshData()" class="text-blue-400 hover:text-blue-600 p-2 transition-all"><i class="fas fa-redo-alt text-sm"></i></button>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 p-2 transition-all"><i class="fas fa-power-off text-sm"></i></button>
                </div>
            </div>

            <!-- Magic Stats -->
            <div id="statsBar" class="mt-4 flex gap-2 hidden">
                <div class="magic-gold flex-1 p-3 rounded-2xl text-blue-900 shadow-sm flex items-center justify-between overflow-hidden relative">
                    <i class="fas fa-wand-magic-sparkles absolute -right-2 -bottom-2 opacity-10 text-4xl"></i>
                    <div>
                        <p class="text-[9px] uppercase font-black opacity-60">Magic Points</p>
                        <p class="text-xl font-black" id="statGold">0</p>
                    </div>
                    <i class="fas fa-certificate text-xl opacity-40"></i>
                </div>
                <div id="streakBox" class="bg-white/40 backdrop-blur-md flex-1 p-3 rounded-2xl text-blue-700 border border-white/50 flex items-center justify-between transition-colors duration-500">
                    <div>
                        <p class="text-[9px] uppercase font-black opacity-50">Daily Streak</p>
                        <p class="text-xl font-black flex items-center gap-1">
                            <span id="statStreak">0</span>
                            <i class="fas fa-star text-yellow-400 text-xs sparkle"></i>
                        </p>
                    </div>
                    <i class="fas fa-calendar-star text-xl opacity-20"></i>
                </div>
            </div>
        </header>

        <main class="p-6">
            <!-- Park Entrance / Login -->
            <section id="loginView" class="space-y-8 py-4">
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-white/40 backdrop-blur mb-4 border-4 border-white/60 shadow-xl">
                        <i class="fas fa-ticket-alt text-4xl text-blue-600 -rotate-12"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800">Who is visiting today?</h2>
                    <p class="text-sm text-slate-500 mt-1">Select your pass to enter the park</p>
                </div>
                <div id="userList" class="grid grid-cols-1 gap-4"></div>
            </section>

            <!-- Kids Area -->
            <section id="kidDashboard" class="hidden space-y-8">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 flex items-center gap-2">
                            <i id="secIcon1" class="fas fa-map-marked-alt text-blue-600"></i> My FastPass Tasks
                        </h3>
                    </div>
                    <div id="assignedQuests" class="space-y-3"></div>
                </div>

                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-4 flex items-center gap-2">
                        <i id="secIcon2" class="fas fa-globe-americas text-blue-600"></i> Open Adventures
                    </h3>
                    <div id="openBounties" class="space-y-3"></div>
                </div>

                <div id="completedSection" class="pt-6 border-t border-white/30">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-camera-retro"></i> Memories from Today
                    </h3>
                    <div id="completedToday" class="space-y-3 opacity-60"></div>
                </div>
            </section>

            <!-- Parents Area -->
            <section id="parentDashboard" class="hidden space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-black text-blue-900">Cast Member Review</h3>
                    <span id="pendingCount" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">0 Waiting</span>
                </div>
                <div id="approvalQueue" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 disney-gradient text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-500 opacity-0 translate-y-10 z-[110] pointer-events-none text-sm font-bold border-2 border-white/20"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzrtt-QKb11mK6HWj4-vkdUHOh1RHhLl-eDoHGZeCNtxN1EZ5xl8cwlulEAIFRh3plA-g/exec';
        
        const CHARACTER_MAP = {
            'Alexsi': { 
                img: 'https://ih1.redbubble.net/image.782015188.8123/st,small,507x507-pad,600x600,f8f8f8.jpg',
                primary: '#22d3ee',
                secondary: '#0891b2',
                streakBg: 'bg-cyan-50/50',
                streakText: 'text-cyan-700',
                fit: false
            },
            'Mia': { 
                img: 'https://i.imgur.com/2MkDKmz.jpeg',
                primary: '#f472b6',
                secondary: '#db2777',
                streakBg: 'bg-pink-50/50',
                streakText: 'text-pink-700',
                fit: true 
            },
            'Pyper': { 
                img: 'https://upload.wikimedia.org/wikipedia/en/5/56/Moana_%28character%29.png',
                primary: '#fb923c',
                secondary: '#ea580c',
                streakBg: 'bg-orange-50/50',
                streakText: 'text-orange-700',
                fit: true 
            },
            'Emmy': { 
                img: 'https://m.media-amazon.com/images/I/815mnElwFdL._AC_UF894,1000_QL80_.jpg',
                primary: '#a78bfa',
                secondary: '#7c3aed',
                streakBg: 'bg-purple-50/50',
                streakText: 'text-purple-700',
                fit: false
            },
            'Izzy': { 
                img: 'https://i.imgur.com/zDzw0ak.jpeg',
                primary: '#4ade80',
                secondary: '#16a34a',
                streakBg: 'bg-green-50/50',
                streakText: 'text-green-700',
                fit: true 
            },
            'DJ': {
                img: 'https://i.imgur.com/n6xIT8l.jpeg',
                primary: '#3b82f6',
                secondary: '#1d4ed8',
                streakBg: 'bg-blue-50/50',
                streakText: 'text-blue-700',
                fit: false
            },
            'Ash': {
                img: 'https://i.imgur.com/JA8gBIJ.jpeg',
                primary: '#ef4444',
                secondary: '#b91c1c',
                streakBg: 'bg-red-50/50',
                streakText: 'text-red-700',
                fit: false
            }
        };

        let appData = null;
        let currentUser = null;

        window.onload = async () => {
            const success = await refreshData();
            if (success) {
                // Show app and hide overlay with fade
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('loadingOverlay').classList.add('hidden-fade');
                
                const savedUser = localStorage.getItem('choreHero');
                if (savedUser) {
                    try {
                        const parsed = JSON.parse(savedUser);
                        selectUser(parsed.Name);
                    } catch(e) {
                        renderUserSelection();
                    }
                } else {
                    renderUserSelection();
                }
            } else {
                const overlayText = document.getElementById('loadingMsg');
                overlayText.innerHTML = `<span class="text-red-500 font-bold italic">COMMUNICATION BREAKDOWN</span>`;
                document.getElementById('retryBtn').classList.remove('hidden');
                document.querySelector('.loading-spinner').classList.add('hidden');
            }
        };

        async function refreshData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response not ok');
                appData = await response.json();
                if (currentUser) {
                    const updatedUser = appData.users.find(u => u.Name === currentUser.Name);
                    if (updatedUser) {
                        currentUser = updatedUser;
                        updateProfileUI();
                        currentUser.Role === 'Parent' ? renderApprovalQueue() : renderChoreBoard();
                    }
                }
                return true;
            } catch (e) {
                console.error("Refresh Error:", e);
                return false;
            }
        }

        function renderUserSelection() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            if (!appData || !appData.users) return;
            
            document.documentElement.style.setProperty('--theme-primary', '#0066cc');
            document.documentElement.style.setProperty('--theme-secondary', '#004499');

            appData.users.forEach(user => {
                if (!user.Name) return;
                const char = CHARACTER_MAP[user.Name];
                const btn = document.createElement('button');
                btn.className = "card-glass p-4 rounded-3xl flex items-center gap-4 hover:scale-[1.02] active:scale-[0.98] transition-all text-left group border border-white/40";
                
                let iconHtml = (char?.img) ? 
                    `<img src="${char.img}" class="w-14 h-14 rounded-2xl shadow-lg border-2 border-white group-hover:rotate-3 transition-transform ${char?.fit ? 'fit-avatar' : 'object-cover'}">` :
                    `<div class="w-14 h-14 rounded-2xl disney-gradient flex items-center justify-center text-white text-2xl shadow-lg"><i class="fas fa-user-tie"></i></div>`;

                btn.innerHTML = `
                    ${iconHtml}
                    <div>
                        <p class="font-black text-xl text-slate-800">${user.Name}</p>
                        <p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">${user.Role === 'Parent' ? 'Cast Member' : 'Park Guest'}</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-400 group-hover:text-blue-500 transition-colors"></i>`;
                btn.onclick = () => selectUser(user.Name);
                list.appendChild(btn);
            });
        }

        function applyTheme(userName) {
            const char = CHARACTER_MAP[userName];
            if (!char) {
                document.documentElement.style.setProperty('--theme-primary', '#002244');
                document.documentElement.style.setProperty('--theme-secondary', '#004499');
                return;
            }
            document.documentElement.style.setProperty('--theme-primary', char.primary);
            document.documentElement.style.setProperty('--theme-secondary', char.secondary);
            const header = document.getElementById('appHeader');
            header.style.borderBottomColor = `${char.primary}20`;
            const streakBox = document.getElementById('streakBox');
            streakBox.className = `flex-1 p-3 rounded-2xl border flex items-center justify-between transition-colors duration-500 bg-white/40 backdrop-blur-md ${char.streakText} border-${char.primary}20`;
            document.getElementById('secIcon1').style.color = char.primary;
            document.getElementById('secIcon2').style.color = char.primary;
        }

        function selectUser(userName) {
            currentUser = appData.users.find(u => u.Name === userName);
            if (!currentUser) { renderUserSelection(); return; }
            
            localStorage.setItem('choreHero', JSON.stringify(currentUser));
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('welcomeText').innerText = `Welcome, ${currentUser.Name}!`;
            document.getElementById('userRoleDisplay').innerText = currentUser.Role === 'Parent' ? 'Main Street Cast Member' : 'Magic Kingdom Guest';
            
            applyTheme(userName);

            const char = CHARACTER_MAP[userName];
            const profImg = document.getElementById('currentProfileImg');
            if (char) {
                profImg.src = char.img;
                profImg.classList.remove('hidden');
                profImg.style.borderColor = char.primary;
                if (char.fit) profImg.classList.add('fit-avatar');
                else profImg.classList.remove('fit-avatar');
            } else {
                profImg.classList.add('hidden');
            }
            
            if (currentUser.Role === 'Parent') {
                document.getElementById('statsBar').classList.add('hidden');
                document.getElementById('parentDashboard').classList.remove('hidden');
                document.getElementById('kidDashboard').classList.add('hidden');
                renderApprovalQueue();
            } else {
                document.getElementById('statsBar').classList.remove('hidden');
                document.getElementById('kidDashboard').classList.remove('hidden');
                document.getElementById('parentDashboard').classList.add('hidden');
                updateProfileUI();
                renderChoreBoard();
            }
        }

        function updateProfileUI() {
            document.getElementById('statGold').innerText = currentUser['Total Points'] || 0;
            document.getElementById('statStreak').innerText = currentUser['Current Streak'] || 0;
        }

        function findKey(obj, possibleKeys) {
            if (!obj) return null;
            const actualKeys = Object.keys(obj);
            for (let pk of possibleKeys) {
                const found = actualKeys.find(ak => ak.toLowerCase().replace(/[^a-z]/g, '') === pk.toLowerCase().replace(/[^a-z]/g, ''));
                if (found) return found;
            }
            return null;
        }

        function isToday(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            const d = new Date(dateStr);
            return d.getDate() === today.getDate() &&
                   d.getMonth() === today.getMonth() &&
                   d.getFullYear() === today.getFullYear();
        }

        function isThisWeek(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now.getTime() - d.getTime();
            return diff < (7 * 24 * 60 * 60 * 1000);
        }

        function renderChoreBoard() {
            const qDiv = document.getElementById('assignedQuests');
            const bDiv = document.getElementById('openBounties');
            const cDiv = document.getElementById('completedToday');
            qDiv.innerHTML = ''; bDiv.innerHTML = ''; cDiv.innerHTML = '';
            
            if (!appData || !appData.chores) return;

            const choreKeys = {
                name: findKey(appData.chores[0], ['Task/Room', 'TaskRoom', 'Task', 'Name']),
                assigned: findKey(appData.chores[0], ['Assigned To', 'AssignedTo', 'Assigned']),
                points: findKey(appData.chores[0], ['Base Points', 'BasePoints', 'Points']),
                freq: findKey(appData.chores[0], ['Frequency', 'Freq', 'Reset'])
            };

            const taskLog = appData.taskLog || [];
            
            appData.chores.forEach(chore => {
                const name = chore[choreKeys.name];
                const basePoints = parseInt(chore[choreKeys.points] || 0);
                const assigned = String(chore[choreKeys.assigned] || '').toLowerCase().trim();
                const freq = String(chore[choreKeys.freq] || 'Daily').toLowerCase().trim();
                const userNameLower = String(currentUser.Name).toLowerCase().trim();
                
                if (!name) return;

                const logEntries = taskLog.filter(l => String(l['Task Name'] || '').toLowerCase() === name.toLowerCase());
                const todaysEntry = logEntries.find(l => isToday(l.Timestamp));
                const lastApprovedEntry = logEntries.filter(l => l.Status === 'Approved').sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp))[0];
                
                const status = todaysEntry ? todaysEntry.Status : null;

                const isAssignedToMe = (assigned === userNameLower);
                const isOpenBounty = (assigned === 'open');

                if (isAssignedToMe) {
                    if (status && status !== 'Denied') {
                        cDiv.appendChild(createChoreCard(name, basePoints, 'border-slate-300', status));
                    } else {
                        qDiv.appendChild(createChoreCard(name, basePoints, 'border-theme', null));
                    }
                } 
                else if (isOpenBounty) {
                    let isAvailable = true;
                    if (freq === 'weekly' && lastApprovedEntry && isThisWeek(lastApprovedEntry.Timestamp)) {
                        isAvailable = false;
                    } else if (todaysEntry && (todaysEntry.Status === 'Pending' || todaysEntry.Status === 'Approved')) {
                        isAvailable = false;
                    }

                    if (isAvailable) {
                        bDiv.appendChild(createChoreCard(name, basePoints, 'border-amber-400', null));
                    } else if (todaysEntry) {
                        cDiv.appendChild(createChoreCard(name, basePoints, 'border-slate-300', todaysEntry.Status));
                    }
                }
            });

            if (qDiv.innerHTML === '') qDiv.innerHTML = '<p class="text-slate-400 text-xs italic text-center py-4 bg-white/20 rounded-2xl border border-dashed border-white/40">No scheduled FastPass tasks.</p>';
            if (bDiv.innerHTML === '') bDiv.innerHTML = '<p class="text-slate-400 text-xs italic text-center py-4 bg-white/20 rounded-2xl border border-dashed border-white/40">The park map is clear!</p>';
            if (cDiv.innerHTML === '') document.getElementById('completedSection').classList.add('hidden');
            else document.getElementById('completedSection').classList.remove('hidden');
        }

        function createChoreCard(name, basePoints, borderColor, status) {
            const card = document.createElement('div');
            const bClass = borderColor === 'border-theme' ? 'border-l-[var(--theme-primary)]' : borderColor;
            card.className = `card-glass p-5 rounded-2xl flex justify-between items-center shadow-sm border-l-8 ${bClass} relative overflow-hidden`;
            
            const streakCount = parseInt(currentUser['Current Streak'] || 0);
            const streakBonus = streakCount * 2; 
            const totalPoints = basePoints + streakBonus;

            let actionHtml = '';
            if (!status) {
                actionHtml = `<button onclick="submitChore('${name.replace(/'/g, "\\'")}', ${totalPoints})" class="disney-gradient text-white px-5 py-2 rounded-xl text-[10px] font-black shadow-lg">COMPLETE</button>`;
            } else {
                const colorClass = status === 'Approved' ? 'bg-green-100/60 text-green-800' : 'bg-blue-100/60 text-blue-800';
                actionHtml = `<span class="${colorClass} px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider border border-current opacity-80">${status}</span>`;
            }

            const char = CHARACTER_MAP[currentUser.Name];
            const bonusUi = (streakBonus > 0 && !status) ? 
                `<span class="text-[8px] bg-white/50 text-green-700 px-1.5 py-0.5 rounded ml-2 font-black bonus-badge flex items-center gap-1">
                    <i class="fas fa-fire-alt"></i> +${streakBonus}
                </span>` : '';

            card.innerHTML = `
                <div class="z-10">
                    <h4 class="font-black text-slate-800 text-lg mb-1">${name}</h4>
                    <div class="flex items-center">
                        <span class="text-[9px] bg-amber-100/50 text-amber-700 px-2 py-0.5 rounded font-black uppercase tracking-tighter border border-amber-200/50">${basePoints} Points</span>
                        ${bonusUi}
                    </div>
                </div>
                <div class="z-10">${actionHtml}</div>`;
            return card;
        }

        async function submitChore(name, totalPoints) {
            showToast(`Saving memory... ✨`);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "submitChore", worker: currentUser.Name, choreName: name, points: totalPoints })
                });
                showToast("Adventure logged!");
                setTimeout(refreshData, 1500);
            } catch (e) { showToast("Signal lost!"); }
        }

        function renderApprovalQueue() {
            const queue = document.getElementById('approvalQueue');
            queue.innerHTML = '';
            if (!appData || !appData.taskLog) return;
            const pending = appData.taskLog.filter(t => String(t.Status || '').trim().toLowerCase() === 'pending');
            document.getElementById('pendingCount').innerText = `${pending.length} Waiting`;
            
            if (pending.length === 0) {
                queue.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm font-medium">All guests are happy!</div>`;
                return;
            }

            pending.forEach(task => {
                const wKey = findKey(task, ['Worker Name', 'WorkerName', 'Worker']);
                const nKey = findKey(task, ['Task Name', 'TaskName', 'Task']);
                const pKey = findKey(task, ['Points Potential', 'PointsPotential', 'Points']);
                
                const card = document.createElement('div');
                card.className = "card-glass p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 space-y-4";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">${task[wKey]}</p>
                            <h4 class="font-black text-lg text-slate-800">${task[nKey]}</h4>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-xl text-amber-600">${task[pKey] || 0}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveJob('${task[wKey].replace(/'/g, "\\'")}', '${task[nKey].replace(/'/g, "\\'")}', ${task[pKey] || 0}, true)" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-black text-[10px] uppercase">Grant Points</button>
                        <button onclick="approveJob('${task[wKey].replace(/'/g, "\\'")}', '${task[nKey].replace(/'/g, "\\'")}', ${task[pKey] || 0}, false)" class="px-6 bg-white/50 border border-white text-slate-500 py-3 rounded-xl font-black text-[10px] uppercase">Deny</button>
                    </div>`;
                queue.appendChild(card);
            });
        }

        async function approveJob(worker, task, points, approved) {
            showToast("Processing...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "approveChore", worker: worker, choreName: task, points: points, approved: approved, approverName: currentUser.Name })
                });
                showToast(approved ? "Points granted! ✨" : "Review finished.");
                setTimeout(refreshData, 1500);
            } catch (e) { showToast("Connection failed."); }
        }

        function logout() { localStorage.removeItem('choreHero'); location.reload(); }

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; 
            t.classList.remove('opacity-0', 'translate-y-10'); 
            setTimeout(() => { t.classList.add('opacity-0', 'translate-y-10'); }, 3000); 
        }
    </script>
</body>
</html>
